policy_version = 2

[output]
mode = "enforce"
fail_threshold = 85

[dangerous_change]
patterns = [
  ".github/workflows/**",
  "infra/**",
  "terraform/**",
  "k8s/**",
  "helm/**",
  "migrations/**",
  "db/migrate/**",
  "**/auth/**",
  "**/security/**",
  "Dockerfile",
  "docker-compose*.yml",
  "docker-compose*.yaml",
  "secrets/**",
]
critical_patterns = [
  ".github/workflows/**",
  "infra/**",
  "terraform/**",
  "k8s/**",
  "migrations/**",
  "secrets/**",
]
