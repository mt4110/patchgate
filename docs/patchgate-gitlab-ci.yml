stages:
  - quality

patchgate:
  stage: quality
  image: rust:1.75
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
    CARGO_TARGET_DIR: $CI_PROJECT_DIR/target
  cache:
    key: patchgate-cargo
    paths:
      - target/
      - .cargo/
  script:
    - cargo run -p patchgate-cli -- scan --mode enforce --scope repo --format json --publish --ci-provider generic --ci-generic-output artifacts/ci-generic.json
  artifacts:
    when: always
    paths:
      - artifacts/ci-generic.json
