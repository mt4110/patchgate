name: Policy Governance

on:
  pull_request:
    paths:
      - "config/policy.toml.example"
      - "config/presets/**"
      - "config/policy.v1.legacy.toml"
      - ".github/CODEOWNERS"
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  approval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure CODEOWNERS includes policy paths
        run: |
          grep -nE "^config/policy.toml.example" .github/CODEOWNERS
          grep -nE "^config/presets/" .github/CODEOWNERS

      - name: Require `policy-approved` label for policy changes
        if: github.event_name == 'pull_request'
        env:
          API_URL: ${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels
          GH_TOKEN: ${{ github.token }}
        run: |
          labels=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" | jq -r '.[].name')
          echo "labels: $labels"
          if ! echo "$labels" | grep -Fxq "policy-approved"; then
            echo "Missing required label: policy-approved"
            exit 1
          fi
