name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  nix-linux:
    name: nix (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: fmt/lint/test (shared just recipe)
        run: nix develop --command just ci-check

      - name: Enforce least-privilege workflow permissions
        run: |
          if grep -RIn "permissions:[[:space:]]*write-all" .github/workflows; then
            echo "write-all permissions are forbidden."
            exit 1
          fi

      - name: Lint policy compatibility matrix
        run: |
          nix develop --command cargo run -p patchgate-cli -- policy lint \
            --path config/policy.toml.example \
            --require-current-version
          nix develop --command cargo run -p patchgate-cli -- policy verify-v1 \
            --path config/policy.toml.example \
            --format text
          for preset in strict balanced relaxed; do
            nix develop --command cargo run -p patchgate-cli -- policy lint \
              --path "config/presets/${preset}.toml" \
              --require-current-version
          done

      - name: GitHub publish dry-run E2E path
        run: |
          nix develop --command cargo run -p patchgate-cli -- scan \
            --scope staged \
            --mode warn \
            --format json \
            --github-publish \
            --github-dry-run \
            --github-repo example/repo \
            --github-pr 1 \
            --github-sha deadbeef \
            --github-dry-run-output artifacts/github-payload.json

      - name: Benchmark compare with regression report
        run: |
          nix develop --command cargo run -p xtask -- bench compare \
            --case ci-worktree \
            --output config/benchmarks/ci-worktree-baseline.jsonl \
            --require-baseline \
            --report-output artifacts/bench-compare.json

      - name: Emit observability logs and history summary
        run: |
          nix develop --command cargo run -p patchgate-cli -- scan \
            --scope staged \
            --mode warn \
            --format json \
            --no-cache \
            --metrics-output artifacts/scan-metrics.jsonl \
            --audit-log-output artifacts/scan-audit.jsonl
          nix develop --command cargo run -p patchgate-cli -- history summary \
            --input artifacts/scan-metrics.jsonl \
            --format json > artifacts/history-summary.json
          nix develop --command cargo run -p patchgate-cli -- history trend \
            --input artifacts/scan-metrics.jsonl \
            --format json > artifacts/history-trend.json
          nix develop --command cargo run -p xtask -- ops slo-report \
            --metrics-input artifacts/scan-metrics.jsonl \
            --output artifacts/slo-report.md

      - name: Upload observability artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-observability
          path: artifacts/

  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test
        run: cargo test --workspace
      - name: scan profile (windows diagnostics)
        if: matrix.os == 'windows-latest'
        run: cargo run -p patchgate-cli -- scan --scope staged --mode warn --format json --no-cache --profile-output artifacts/scan-profile-windows.json
      - name: upload windows profile artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-scan-profile
          path: artifacts/scan-profile-windows.json

  sdk-contract:
    name: sdk-contract (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [python, node, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        if: matrix.lang == 'node'
        with:
          node-version: '20'

      - name: Generate plugin template
        run: |
          cargo run -p patchgate-cli -- plugin init \
            --lang ${{ matrix.lang }} \
            --plugin-id ci-${{ matrix.lang }} \
            --output artifacts/sdk-${{ matrix.lang }}

      - name: Run generated python plugin
        if: matrix.lang == 'python'
        run: |
          python3 artifacts/sdk-python/main.py < artifacts/sdk-python/sample-input.json

      - name: Run generated node plugin
        if: matrix.lang == 'node'
        run: |
          node artifacts/sdk-node/index.js < artifacts/sdk-node/sample-input.json

      - name: Build and run generated rust plugin
        if: matrix.lang == 'rust'
        run: |
          cargo run --manifest-path artifacts/sdk-rust/Cargo.toml --release < artifacts/sdk-rust/sample-input.json
