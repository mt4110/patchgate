name: LTS Backport Check

on:
  pull_request:
    branches:
      - "lts/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate backport label for LTS PR
        if: github.event_name == 'pull_request'
        env:
          API_URL: ${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels
          GH_TOKEN: ${{ github.token }}
        run: |
          labels=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" | jq -r '.[].name')
          echo "labels: $labels"
          if ! echo "$labels" | grep -Eq '^backport/lts-v1$'; then
            echo "LTS PR requires label: backport/lts-v1"
            exit 1
          fi

      - name: Check LTS backport SLA age (72h)
        if: github.event_name == 'pull_request'
        run: |
          created_at="${{ github.event.pull_request.created_at }}"
          created_epoch=$(date -u -d "$created_at" +%s)
          now_epoch=$(date -u +%s)
          age_hours=$(( (now_epoch - created_epoch) / 3600 ))
          echo "LTS PR age_hours=${age_hours}"
          if [ "$age_hours" -gt 72 ]; then
            echo "LTS backport SLA exceeded: ${age_hours}h > 72h"
            exit 1
          fi

      - name: Emit backport status artifact
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p artifacts
          cat > artifacts/lts-backport-status.json <<EOF
          {
            "schema_version": 1,
            "pr_number": "${{ github.event.pull_request.number }}",
            "created_at": "${{ github.event.pull_request.created_at }}",
            "branch": "${{ github.event.pull_request.base.ref }}"
          }
          EOF

      - name: Upload backport status artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lts-backport-status-${{ github.event.pull_request.number }}
          path: artifacts/lts-backport-status.json
