name: Plugin Trust Rollout

on:
  workflow_dispatch:
    inputs:
      policy_path:
        description: Policy file to validate
        required: true
        default: config/policy.toml.example
      require_next_key:
        description: Require at least one trusted key env for rotation dry-run
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  keyring-audit:
    runs-on: ubuntu-latest
    env:
      PATCHGATE_PLUGIN_PUBLIC_KEY: ${{ secrets.PATCHGATE_PLUGIN_PUBLIC_KEY }}
      PATCHGATE_PLUGIN_PUBLIC_KEY_NEXT: ${{ secrets.PATCHGATE_PLUGIN_PUBLIC_KEY_NEXT }}
      POLICY_PATH: ${{ inputs.policy_path }}
      REQUIRE_NEXT_KEY: ${{ inputs.require_next_key }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Validate policy
        run: |
          cargo run -p patchgate-cli -- policy lint \
            --path "$POLICY_PATH" \
            --require-current-version

      - name: Validate plugin keyring secrets
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import os
          import sys
          import tomllib

          policy_path = os.environ["POLICY_PATH"]
          with open(policy_path, "rb") as handle:
              policy = tomllib.load(handle)

          signature = policy.get("plugins", {}).get("signature", {})
          signature_required = bool(signature.get("required", False))
          primary = str(signature.get("public_key_env", "PATCHGATE_PLUGIN_PUBLIC_KEY")).strip()
          trusted = [
              str(name).strip()
              for name in signature.get("trusted_key_envs", [])
              if str(name).strip()
          ]
          require_next_key = os.environ.get("REQUIRE_NEXT_KEY") == "true"

          required = []
          if signature_required or require_next_key:
              for name in [primary, *trusted]:
                  if name and name not in required:
                      required.append(name)

          if require_next_key and not trusted:
              print("::error::require_next_key was set, but policy has no plugins.signature.trusted_key_envs entries")
              sys.exit(1)

          if not required:
              print("plugin signature is not required by policy; skipping keyring secret validation")
              sys.exit(0)

          failed = False
          for name in required:
              value = os.environ.get(name, "").strip()
              if not value:
                  print(f"::error::{name} is not configured")
                  failed = True
                  continue
              try:
                  raw = base64.b64decode(value, validate=True)
              except Exception as exc:
                  print(f"::error::{name} is not valid base64: {exc}")
                  failed = True
                  continue
              if len(raw) != 32:
                  print(f"::error::{name} decoded length is {len(raw)} bytes, expected 32")
                  failed = True
                  continue
              print(f"{name}: sha256={hashlib.sha256(raw).hexdigest()}")

          if failed:
              sys.exit(1)
          PY

      - name: Run plugin trust tests
        run: |
          cargo test -p patchgate-config --lib
          cargo test -p patchgate-core plugin_signature_verification
