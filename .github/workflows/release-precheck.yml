name: Release Precheck

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  precheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Ensure macOS metadata files are not tracked
        run: |
          if git ls-files '._*' '**/._*' | grep .; then
            echo "Found forbidden macOS metadata files in git index."
            exit 1
          fi

      - name: Run fmt/lint/test
        run: nix develop --command just ci-check

      - name: Run patchgate doctor
        run: nix develop --command cargo run -p patchgate-cli -- doctor

      - name: Policy lint (example + presets)
        run: |
          mkdir -p artifacts
          cp config/policy.toml.example artifacts/policy.lts.toml
          cp config/policy.toml.example artifacts/policy.needs-autofix.toml
          cp config/policy.toml.example artifacts/policy.v2.toml
          sed -i 's/^active = false$/active = true/' artifacts/policy.lts.toml
          sed -i 's/^rc_frozen = true$/rc_frozen = false/' artifacts/policy.needs-autofix.toml
          sed -i 's/^allow_legacy_config_names = false$/allow_legacy_config_names = true/' artifacts/policy.needs-autofix.toml
          sed -i 's/^generic_schema = .*/generic_schema = "dual" # v1 | v2 | dual/' artifacts/policy.v2.toml
          sed -i 's|^audit_v2_jsonl_path = ""$|audit_v2_jsonl_path = "artifacts/scan-audit-v2.jsonl"|' artifacts/policy.v2.toml
          sed -i 's/^shadow_mode = false$/shadow_mode = true/' artifacts/policy.v2.toml
          sed -i 's/^bridge_mode = .*/bridge_mode = "full" # off | provider | audit | full/' artifacts/policy.v2.toml
          sed -i 's|^migration_guide_path = ""$|migration_guide_path = "docs/16_v2_migration_guide_alpha.md"|' artifacts/policy.v2.toml
          nix develop --command cargo run -p patchgate-cli -- policy lint \
            --path config/policy.toml.example \
            --require-current-version
          nix develop --command cargo run -p patchgate-cli -- policy verify-v1 \
            --path config/policy.toml.example \
            --format text
          nix develop --command cargo run -p patchgate-cli -- policy verify-v1 \
            --path config/policy.toml.example \
            --readiness-profile strict \
            --format text
          nix develop --command cargo run -p patchgate-cli -- policy verify-v1 \
            --path artifacts/policy.lts.toml \
            --readiness-profile lts \
            --format text
          set +e
          nix develop --command cargo run -p patchgate-cli -- policy verify-v1 \
            --path artifacts/policy.needs-autofix.toml \
            --format text \
            --autofix-output artifacts/policy.autofix.toml
          autofix_code=$?
          set -e
          test "$autofix_code" -eq 14
          nix develop --command cargo run -p patchgate-cli -- policy verify-v1 \
            --path artifacts/policy.autofix.toml \
            --format text
          nix develop --command cargo run -p patchgate-cli -- policy verify-v2 \
            --path artifacts/policy.v2.toml \
            --format json > artifacts/verify-v2.json
          nix develop --command cargo run -p patchgate-cli -- policy diff-contract \
            --path artifacts/policy.v2.toml \
            --format json > artifacts/diff-contract.json
          for preset in strict balanced relaxed; do
            nix develop --command cargo run -p patchgate-cli -- policy lint \
              --path "config/presets/${preset}.toml" \
              --require-current-version
          done

      - name: GitHub publish dry-run smoke test
        run: |
          nix develop --command cargo run -p patchgate-cli -- scan \
            --scope staged \
            --mode warn \
            --format json \
            --github-publish \
            --github-dry-run \
            --github-repo example/repo \
            --github-pr 1 \
            --github-sha deadbeef \
            --github-dry-run-output artifacts/github-payload.json

      - name: Generic provider dual-schema smoke test
        run: |
          nix develop --command cargo run -p patchgate-cli -- scan \
            --scope staged \
            --mode warn \
            --format json \
            --no-cache \
            --publish \
            --ci-provider generic \
            --ci-generic-schema dual \
            --ci-generic-output artifacts/provider-dual.json

      - name: Benchmark baseline compare
        run: |
          nix develop --command cargo run -p xtask -- bench compare \
            --case ci-worktree \
            --output config/benchmarks/ci-worktree-baseline.jsonl \
            --require-baseline \
            --report-output artifacts/bench-compare.json

      - name: Capture scan profile
        run: |
          nix develop --command cargo run -p xtask -- bench profile \
            --repo . \
            --profile-output artifacts/scan-profile.json

      - name: Generate audit and weekly summary artifacts
        run: |
          nix develop --command cargo run -p patchgate-cli -- scan \
            --scope staged \
            --mode warn \
            --format json \
            --no-cache \
            --metrics-output artifacts/scan-metrics.jsonl \
            --audit-log-output artifacts/scan-audit.jsonl \
            --audit-log-v2-output artifacts/scan-audit-v2.jsonl
          nix develop --command cargo run -p patchgate-cli -- history summary \
            --input artifacts/scan-metrics.jsonl \
            --format json > artifacts/history-summary.json
          nix develop --command cargo run -p patchgate-cli -- history trend \
            --input artifacts/scan-metrics.jsonl \
            --format json > artifacts/history-trend.json
          nix develop --command cargo run -p xtask -- ops weekly-summary \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --output artifacts/weekly-ops-summary.md \
            --trend-output artifacts/weekly-ops-trend.json
          nix develop --command cargo run -p xtask -- ops audit-report \
            --audit-input artifacts/scan-audit.jsonl \
            --output artifacts/audit-report.md
          nix develop --command cargo run -p xtask -- ops slo-report \
            --metrics-input artifacts/scan-metrics.jsonl \
            --output artifacts/slo-report.md
          nix develop --command cargo run -p xtask -- ops ga-readiness \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --output artifacts/ga-readiness.md
          nix develop --command cargo run -p xtask -- ops verify-v1-calibrate \
            --metrics-input artifacts/scan-metrics.jsonl \
            --output artifacts/verify-v1-calibration.md
          nix develop --command cargo run -p xtask -- ops compatibility-report \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --output artifacts/compatibility-report.md
          nix develop --command cargo run -p xtask -- ops audit-drift-report \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --output artifacts/audit-drift-report.md

      - name: Build RC security review template
        run: |
          mkdir -p artifacts
          {
            echo "# RC Security Review Packet"
            echo
            echo "## Inputs"
            echo "- history summary: artifacts/history-summary.json"
            echo "- history trend: artifacts/history-trend.json"
            echo "- audit drift: artifacts/audit-drift-report.md"
            echo
            echo "## Review Criteria"
            echo "- verify no unknown failure codes are introduced"
            echo "- confirm dual-write drift is understood"
            echo "- confirm candidate docs are synced"
            echo
            echo "## Decision"
            echo "- CI fixture: pre-approved to exercise rc-readiness gating"
            echo "- [x] Continue"
            echo "- [ ] Mitigation required"
          } > artifacts/security-review-template.md

      - name: Dead-letter replay dry-run smoke test
        run: |
          cat > artifacts/dead-letter.jsonl <<'EOF'
          {"schema_version":1,"unix_ts":1700000000,"transport":"notification","endpoint":"https://example.internal/hook","idempotency_key":"pgv1-precheck","error":"timeout","payload":{"event":"scan.completed.notification","summary":{"score":88}}}
          EOF
          nix develop --command cargo run -p patchgate-cli -- delivery replay \
            --input artifacts/dead-letter.jsonl \
            --dry-run \
            --max-records 1 \
            --summary-output artifacts/dead-letter-replay-summary.json
          jq -e '.dry_run_records == 1' artifacts/dead-letter-replay-summary.json

      - name: Dead-letter replay rewrite smoke test
        run: |
          python3 - <<'PY' &
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def do_POST(self):
                  _ = self.rfile.read(int(self.headers.get("Content-Length", "0")))
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b"ok")

              def log_message(self, format, *args):
                  return

          HTTPServer(("127.0.0.1", 18080), Handler).handle_request()
          PY
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          sleep 1
          cat > artifacts/dead-letter-success.jsonl <<'EOF'
          {"schema_version":1,"unix_ts":1700000000,"transport":"notification","endpoint":"http://127.0.0.1:18080/hook","idempotency_key":"pgv1-precheck-success","error":"timeout","payload":{"event":"scan.completed.notification","summary":{"score":88}}}
          EOF
          nix develop --command cargo run -p patchgate-cli -- delivery replay \
            --input artifacts/dead-letter-success.jsonl \
            --rewrite-input \
            --max-records 1 \
            --summary-output artifacts/dead-letter-rewrite-summary.json
          wait "$server_pid"
          jq -e '.rewrite_input == true and .successful_records == 1 and .failed_records == 0 and .retained_records == 0' artifacts/dead-letter-rewrite-summary.json
          test ! -s artifacts/dead-letter-success.jsonl

      - name: Refresh compatibility report with replay evidence
        run: |
          nix develop --command cargo run -p xtask -- ops replay-normalize \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --output artifacts/dead-letter-evidence.json
          nix develop --command cargo run -p xtask -- ops compatibility-report \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --output artifacts/compatibility-report.md
          nix develop --command cargo run -p xtask -- ops freeze-scoreboard \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --output artifacts/v1.1-readiness.md
          nix develop --command cargo run -p xtask -- ops freeze-boundary \
            --output artifacts/v1.1-freeze-boundary.md
          nix develop --command cargo run -p xtask -- ops shadow-review \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --output artifacts/shadow-review.md
          nix develop --command cargo run -p xtask -- ops fleet-review \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --provider-input artifacts/provider-dual.json \
            --cost-ceiling-minutes 30 \
            --output artifacts/fleet-review.md
          nix develop --command cargo run -p xtask -- ops rc-readiness \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --provider-input artifacts/provider-dual.json \
            --benchmark-input artifacts/bench-compare.json \
            --security-review-input artifacts/security-review-template.md \
            --migration-guide-path docs/16_v2_migration_guide_alpha.md \
            --provider-rollout-path docs/15_provider_rollout_checklist.md \
            --candidate-checklist-path docs/18_v2_candidate_release_checklist.md \
            --freeze-boundary-path artifacts/v1.1-freeze-boundary.md \
            --output artifacts/v2-rc-readiness.md

      - name: Verify SBOM and provenance metadata contract
        run: |
          nix develop --command cargo metadata --format-version 1 > artifacts/sbom.cargo-metadata.json
          nix develop --command cargo install cargo-cyclonedx --locked
          nix develop --command cargo cyclonedx --manifest-path Cargo.toml --format json --override-filename sbom.cyclonedx
          find crates -name 'sbom.cyclonedx.json' -exec sh -c '
            for f do
              crate="$(basename "$(dirname "$f")")"
              cp "$f" "artifacts/${crate}.sbom.cyclonedx.json"
            done
          ' sh {} +
          jq -e '.packages | length > 0' artifacts/sbom.cargo-metadata.json
          jq -n --arg commit "$(git rev-parse HEAD)" \
            '{schema_version:1,predicate_type:"https://slsa.dev/provenance/v1",commit:$commit}' \
            > artifacts/provenance.intoto.jsonl
          jq -e '.predicate_type == "https://slsa.dev/provenance/v1"' artifacts/provenance.intoto.jsonl

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-precheck-performance
          path: artifacts/
