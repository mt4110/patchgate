name: Release GA

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
      rc_security_decision:
        description: "RC security review decision"
        required: true
        default: hold
        type: choice
        options:
          - hold
          - continue
      ga_decision:
        description: "GA release decision"
        required: true
        default: no-go
        type: choice
        options:
          - no-go
          - go

permissions:
  id-token: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - uses: sigstore/cosign-installer@v3.8.1

      - name: Prepare v2 policy evidence
        run: |
          mkdir -p artifacts
          cp config/policy.toml.example artifacts/policy.v2.toml
          sed -i 's/^active = false$/active = true/' artifacts/policy.v2.toml
          sed -i 's|^branch = "lts/v1"$|branch = "lts/v2"|' artifacts/policy.v2.toml
          sed -i 's|^backport_labels = .*|backport_labels = ["backport/lts-v2"]|' artifacts/policy.v2.toml
          sed -i 's/^generic_schema = .*/generic_schema = "dual" # v1 | v2 | dual/' artifacts/policy.v2.toml
          sed -i 's|^audit_v2_jsonl_path = ""$|audit_v2_jsonl_path = "artifacts/scan-audit-v2.jsonl"|' artifacts/policy.v2.toml
          sed -i 's/^shadow_mode = false$/shadow_mode = true/' artifacts/policy.v2.toml
          sed -i 's/^bridge_mode = .*/bridge_mode = "full" # off | provider | audit | full/' artifacts/policy.v2.toml
          sed -i 's|^migration_guide_path = ""$|migration_guide_path = "docs/16_v2_migration_guide_alpha.md"|' artifacts/policy.v2.toml
          cargo run -p patchgate-cli -- policy verify-v2 \
            --path artifacts/policy.v2.toml \
            --readiness-profile ga \
            --format json > artifacts/verify-v2.json
          cargo run -p patchgate-cli -- policy diff-contract \
            --path artifacts/policy.v2.toml \
            --format json \
            --enforce > artifacts/diff-contract.json

      - name: Generate telemetry and provider artifacts
        run: |
          cargo run -p patchgate-cli -- scan \
            --scope staged \
            --mode warn \
            --format json \
            --no-cache \
            --metrics-output artifacts/scan-metrics.jsonl \
            --audit-log-output artifacts/scan-audit.jsonl \
            --audit-log-v2-output artifacts/scan-audit-v2.jsonl
          cargo run -p patchgate-cli -- scan \
            --scope staged \
            --mode warn \
            --format json \
            --no-cache \
            --publish \
            --ci-provider generic \
            --ci-generic-schema dual \
            --ci-generic-output artifacts/provider-dual.json
          cargo run -p patchgate-cli -- policy verify-v2 \
            --path artifacts/policy.v2.toml \
            --readiness-profile ga \
            --provider-input artifacts/provider-dual.json \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --plugin-shadow-input sdk/templates/python-plugin/sample-input.v2.json \
            --webhook-envelope-input examples/poc/compatibility-lab/webhook-shadow-envelope.json \
            --notification-envelope-input examples/poc/compatibility-lab/notification-shadow-envelope.json \
            --format json > artifacts/verify-v2-artifacts.json
          cargo run -p patchgate-cli -- history summary \
            --input artifacts/scan-metrics.jsonl \
            --format json > artifacts/history-summary.json
          cargo run -p patchgate-cli -- history trend \
            --input artifacts/scan-metrics.jsonl \
            --format json > artifacts/history-trend.json
          cargo run -p xtask -- bench compare \
            --case ci-worktree \
            --output config/benchmarks/ci-worktree-baseline.jsonl \
            --require-baseline \
            --report-output artifacts/bench-compare.json
      - name: Generate replay evidence
        run: |
          python3 - <<'PY' &
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def do_POST(self):
                  _ = self.rfile.read(int(self.headers.get("Content-Length", "0")))
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b"ok")

              def log_message(self, format, *args):
                  return

          HTTPServer(("127.0.0.1", 18080), Handler).handle_request()
          PY
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          sleep 1
          cat > artifacts/dead-letter-success.jsonl <<'EOF'
          {"schema_version":1,"unix_ts":1700000000,"transport":"notification","endpoint":"http://127.0.0.1:18080/hook","idempotency_key":"pgv1-release-ga","error":"timeout","payload":{"event":"scan.completed.notification","summary":{"score":88}}}
          EOF
          cargo run -p patchgate-cli -- delivery replay \
            --input artifacts/dead-letter-success.jsonl \
            --rewrite-input \
            --max-records 1 \
            --summary-output artifacts/dead-letter-rewrite-summary.json
          wait "$server_pid"

      - name: Build v2 ops packets
        run: |
          cargo run -p xtask -- ops compatibility-report \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --output artifacts/compatibility-report.md
          cargo run -p xtask -- ops freeze-scoreboard \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --output artifacts/v1.1-readiness.md
          cargo run -p xtask -- ops freeze-boundary \
            --output artifacts/v1.1-freeze-boundary.md
          cargo run -p xtask -- ops audit-drift-report \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --output artifacts/audit-drift-report.md
          cargo run -p xtask -- ops shadow-review \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --provider-input artifacts/provider-dual.json \
            --webhook-envelope-input examples/poc/compatibility-lab/webhook-shadow-envelope.json \
            --notification-envelope-input examples/poc/compatibility-lab/notification-shadow-envelope.json \
            --output artifacts/shadow-review.md
          cargo run -p xtask -- ops fleet-review \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --provider-input artifacts/provider-dual.json \
            --cost-ceiling-minutes 30 \
            --output artifacts/fleet-review.md
          cargo run -p xtask -- ops rollback-packet \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --provider-input artifacts/provider-dual.json \
            --output artifacts/rollback-packet.json
          cargo run -p xtask -- ops migration-drill \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --provider-input artifacts/provider-dual.json \
            --rollback-packet-input artifacts/rollback-packet.json \
            --output artifacts/migration-drill.json
          if [ "${{ inputs.rc_security_decision }}" != "continue" ]; then
            echo "RC security review decision must be continue to build release packets."
            exit 1
          fi
          {
            echo "# RC Security Review Packet"
            echo
            echo "## Inputs"
            echo "- history summary: artifacts/history-summary.json"
            echo "- history trend: artifacts/history-trend.json"
            echo "- verify-v2: artifacts/verify-v2.json"
            echo "- audit-drift: artifacts/audit-drift-report.md"
            echo "- shadow-review: artifacts/shadow-review.md"
            echo "- fleet-review: artifacts/fleet-review.md"
            echo "- rollback packet: artifacts/rollback-packet.json"
            echo
            echo "## Review Criteria"
            echo "- verify no unknown failure codes are introduced"
            echo "- confirm audit v1/v2 event identity and failure counts match"
            echo "- confirm rollback packet restores provider and audit authority to v1"
            echo "- confirm cost and provenance signals have no open blockers"
            echo
            echo "## Decision"
            echo "- manual workflow input: rc_security_decision=continue"
            echo "- [x] Continue"
            echo "- [ ] Mitigation required"
          } > artifacts/security-review-template.md
          cargo run -p xtask -- ops rc-readiness \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --provider-input artifacts/provider-dual.json \
            --benchmark-input artifacts/bench-compare.json \
            --security-review-input artifacts/security-review-template.md \
            --contract-freeze-input artifacts/diff-contract.json \
            --migration-drill-input artifacts/migration-drill.json \
            --rollback-packet-input artifacts/rollback-packet.json \
            --fleet-review-input artifacts/fleet-review.md \
            --migration-guide-path docs/16_v2_migration_guide_alpha.md \
            --provider-rollout-path docs/15_provider_rollout_checklist.md \
            --candidate-checklist-path docs/18_v2_candidate_release_checklist.md \
            --freeze-boundary-path artifacts/v1.1-freeze-boundary.md \
            --sunset-notice-path docs/21_v1_sunset_notice.md \
            --output artifacts/v2-rc-readiness.md
          if [ "${{ inputs.ga_decision }}" != "go" ]; then
            echo "GA release decision must be go after RC readiness is green."
            exit 1
          fi
          {
            echo "# V2 GA Go / No-Go Review"
            echo
            echo "## Required Evidence"
            echo "- RC readiness: artifacts/v2-rc-readiness.md"
            echo "- rollback packet: artifacts/rollback-packet.json"
            echo "- LTS policy: artifacts/policy.v2.toml"
            echo "- v1 sunset notice: docs/21_v1_sunset_notice.md"
            echo "- support path: docs/22_v2_support_model.md"
            echo
            echo "## Decision"
            echo "- manual workflow input: ga_decision=go"
            echo "- [x] Go"
            echo "- [ ] No-go"
          } > artifacts/v2-ga-go-no-go.md
          cargo run -p xtask -- ops ga-packet \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --policy-input artifacts/policy.v2.toml \
            --rc-readiness-input artifacts/v2-rc-readiness.md \
            --go-no-go-path artifacts/v2-ga-go-no-go.md \
            --fleet-review-input artifacts/fleet-review.md \
            --migration-guide-path docs/16_v2_migration_guide_alpha.md \
            --candidate-checklist-path docs/18_v2_candidate_release_checklist.md \
            --ops-handbook-path docs/19_v2_ops_handbook.md \
            --support-model-path docs/22_v2_support_model.md \
            --sunset-notice-path docs/21_v1_sunset_notice.md \
            --phase201-backcast-path docs/20_phase201_plus_backcast.md \
            --output artifacts/v2-ga-packet.md
          cargo run -p xtask -- ops migration-completion \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --provider-input artifacts/provider-dual.json \
            --fleet-review-input artifacts/fleet-review.md \
            --rc-readiness-input artifacts/v2-rc-readiness.md \
            --migration-drill-input artifacts/migration-drill.json \
            --migration-guide-path docs/16_v2_migration_guide_alpha.md \
            --candidate-checklist-path docs/18_v2_candidate_release_checklist.md \
            --output artifacts/ecosystem-migration-completion.md
          cargo run -p xtask -- ops dual-run-decommission \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --provider-input artifacts/provider-dual.json \
            --rollback-packet-input artifacts/rollback-packet.json \
            --migration-drill-input artifacts/migration-drill.json \
            --rc-readiness-input artifacts/v2-rc-readiness.md \
            --sunset-notice-path docs/21_v1_sunset_notice.md \
            --support-model-path docs/22_v2_support_model.md \
            --output artifacts/dual-run-decommission.md
          cargo run -p xtask -- ops post-ga-telemetry \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --replay-summary-input artifacts/dead-letter-rewrite-summary.json \
            --fleet-review-input artifacts/fleet-review.md \
            --ga-packet-input artifacts/v2-ga-packet.md \
            --support-model-path docs/22_v2_support_model.md \
            --output artifacts/post-ga-telemetry-review.md
          cargo run -p xtask -- ops retrospective-cleanup \
            --migration-completion-input artifacts/ecosystem-migration-completion.md \
            --dual-run-decommission-input artifacts/dual-run-decommission.md \
            --post-ga-telemetry-input artifacts/post-ga-telemetry-review.md \
            --ops-handbook-path docs/19_v2_ops_handbook.md \
            --support-model-path docs/22_v2_support_model.md \
            --sunset-notice-path docs/21_v1_sunset_notice.md \
            --phase201-backcast-path docs/20_phase201_plus_backcast.md \
            --output artifacts/retrospective-cleanup-queue.md

      - name: Build release binary
        run: |
          cargo build -p patchgate-cli --release
          cp target/release/patchgate "artifacts/patchgate-${RELEASE_VERSION}-linux-amd64"

      - name: Generate checksums and SBOM-like metadata
        run: |
          sha256sum "artifacts/patchgate-${RELEASE_VERSION}-linux-amd64" > artifacts/SHA256SUMS
          cargo metadata --format-version 1 > artifacts/sbom.cargo-metadata.json
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --manifest-path Cargo.toml --format json --override-filename sbom.cyclonedx
          find crates -name 'sbom.cyclonedx.json' -exec sh -c '
            for f do
              crate="$(basename "$(dirname "$f")")"
              cp "$f" "artifacts/${crate}.sbom.cyclonedx.json"
            done
          ' sh {} +

      - name: Sign release artifact (cosign keyless)
        run: |
          cosign sign-blob \
            --yes \
            --output-signature "artifacts/patchgate-${RELEASE_VERSION}-linux-amd64.sig" \
            --output-certificate "artifacts/patchgate-${RELEASE_VERSION}-linux-amd64.pem" \
            "artifacts/patchgate-${RELEASE_VERSION}-linux-amd64"

      - name: Generate provenance metadata
        run: |
          jq -n \
            --arg version "${RELEASE_VERSION}" \
            --arg commit "$(git rev-parse HEAD)" \
            --arg built_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg artifact "patchgate-${RELEASE_VERSION}-linux-amd64" \
            '{
              schema_version: 1,
              predicate_type: "https://slsa.dev/provenance/v1",
              version: $version,
              commit: $commit,
              built_at: $built_at,
              artifact: $artifact
            }' > artifacts/provenance.intoto.jsonl

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ga-${{ inputs.version }}
          path: artifacts/
