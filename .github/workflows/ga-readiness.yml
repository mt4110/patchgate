name: GA Readiness

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Generate metrics/audit sample
        run: |
          cargo run -p patchgate-cli -- scan \
            --scope staged \
            --mode warn \
            --format json \
            --no-cache \
            --metrics-output artifacts/scan-metrics.jsonl \
            --audit-log-output artifacts/scan-audit.jsonl

      - name: Verify v1 readiness
        run: |
          mkdir -p artifacts
          cp config/policy.toml.example artifacts/policy.lts.toml
          sed -i 's/^active = false$/active = true/' artifacts/policy.lts.toml
          cargo run -p patchgate-cli -- policy verify-v1 \
            --path config/policy.toml.example \
            --format text
          cargo run -p patchgate-cli -- policy verify-v1 \
            --path config/policy.toml.example \
            --readiness-profile strict \
            --format text
          cargo run -p patchgate-cli -- policy verify-v1 \
            --path artifacts/policy.lts.toml \
            --readiness-profile lts \
            --format text

      - name: Build verify-v1 calibration report
        run: |
          cargo run -p xtask -- ops verify-v1-calibrate \
            --metrics-input artifacts/scan-metrics.jsonl \
            --output artifacts/verify-v1-calibration.md

      - name: Build GA readiness report
        run: |
          cargo run -p xtask -- ops ga-readiness \
            --metrics-input artifacts/scan-metrics.jsonl \
            --audit-input artifacts/scan-audit.jsonl \
            --output artifacts/ga-readiness.md

      - name: Build v1.1 readiness summary
        run: |
          mkdir -p artifacts
          cat > artifacts/v1.1-readiness.md <<'EOF'
          # v1.1 Readiness

          - verify-v1 profiles: executed (standard/strict/lts)
          - calibration report: generated
          - ga-readiness report: generated
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: ga-readiness
          path: |
            artifacts/ga-readiness.md
            artifacts/verify-v1-calibration.md
            artifacts/v1.1-readiness.md
