name: SIEM Handoff

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * 1"

permissions:
  contents: read

jobs:
  handoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Generate audit v2 events
        run: |
          cargo run -p patchgate-cli -- scan \
            --scope staged \
            --mode warn \
            --format json \
            --no-cache \
            --metrics-output artifacts/scan-metrics.jsonl \
            --audit-log-output artifacts/scan-audit.jsonl \
            --audit-log-v2-output artifacts/scan-audit-v2.jsonl

      - name: Build SIEM handoff artifact
        run: |
          cargo run -p xtask -- ops siem-handoff \
            --audit-v2-input artifacts/scan-audit-v2.jsonl \
            --output artifacts/siem-handoff.jsonl

      - uses: actions/upload-artifact@v4
        with:
          name: siem-handoff
          path: artifacts/siem-handoff.jsonl
